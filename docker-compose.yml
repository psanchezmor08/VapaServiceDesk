version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vapaone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vapaone
      POSTGRES_USER: vapaone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vapaone_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vapaone-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vapaone-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://vapaone:${POSTGRES_PASSWORD:-vapaone_secret}@postgres:5432/vapaone
      - SECRET_KEY=${SECRET_KEY:-vapaone-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      - postgres
    ports:
      - "8003:8002"
    networks:
      - vapaone-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8002}
    container_name: vapaone-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vapaone-network

networks:
  vapaone-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local